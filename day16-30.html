<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day16〜30 Task 2 学習サイト｜30 Days IELTS Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --main:#E31837; --main-dark:#B90F2B;
    --accent:#003366; --accent-light:#0A4A8A;
    --ink:#1e2430; --gray:#5f6b7a;
    --bg:#f6f8fb; --line:#e4e9f0;
    --ok:#0d7a4f; --ok-bg:#e8f5ee;
    --ng:#c62828; --ng-bg:#fdecea;
    --radius:14px; --shadow:0 8px 30px rgba(0,51,102,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .en{font-family:'Montserrat','Noto Sans JP',sans-serif}

  header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--line)}
  .header-inner{width:min(1200px,94%);margin-inline:auto;display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:.98rem;color:var(--accent)}
  .logo-mark{width:32px;height:32px;border-radius:8px;background:var(--main);color:#fff;display:grid;place-items:center;font-family:'Montserrat';font-weight:800;font-size:.72rem}
  .header-right{display:flex;align-items:center;gap:14px}
  .progress-pill{font-size:.78rem;font-weight:700;color:var(--accent);background:#eef3f9;padding:6px 14px;border-radius:999px}
  .btn-ghost{font-size:.8rem;border:1.5px solid var(--line);border-radius:999px;padding:7px 16px;color:var(--gray);cursor:pointer;background:#fff;font-family:inherit}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  .layout{width:min(1200px,94%);margin:28px auto 80px;display:grid;grid-template-columns:250px 1fr;gap:28px;align-items:start}

  aside{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;position:sticky;top:84px;max-height:calc(100vh - 110px);overflow-y:auto}
  aside h2{font-size:.8rem;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
  .day-nav{list-style:none}
  .day-nav li{margin-bottom:6px}
  .day-nav button{
    width:100%;text-align:left;background:none;border:0;cursor:pointer;font-family:inherit;
    padding:9px 12px;border-radius:9px;font-size:.83rem;line-height:1.5;color:var(--ink);
    display:flex;gap:10px;align-items:center;transition:background .15s;
  }
  .day-nav button:hover{background:#eef3f9}
  .day-nav button.active{background:var(--accent);color:#fff}
  .day-nav .num{font-family:'Montserrat';font-weight:800;font-size:.7rem;color:var(--main);flex-shrink:0;width:44px}
  .day-nav button.active .num{color:#ffb3c0}
  .day-nav .done-mark{margin-left:auto;color:var(--ok);font-weight:900}
  .day-nav button.active .done-mark{color:#9fe8c8}
  .progress-bar-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .progress-bar{height:8px;background:#eef3f9;border-radius:999px;overflow:hidden}
  .progress-bar > div{height:100%;background:var(--main);border-radius:999px;transition:width .4s}
  .progress-text{font-size:.75rem;color:var(--gray);margin-top:6px;text-align:right}

  main{min-width:0}
  .lesson-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:40px;margin-bottom:24px}
  .day-label{color:var(--main);font-family:'Montserrat';font-weight:800;font-size:.85rem;letter-spacing:.12em}
  .lesson-title{font-size:clamp(1.25rem,2.6vw,1.6rem);font-weight:900;color:var(--accent);margin:4px 0 8px}
  .time-badge{display:inline-block;font-size:.75rem;background:#eef3f9;color:var(--accent);border-radius:999px;padding:3px 12px;font-weight:700}

  .goal-box{background:#fff8f9;border-left:4px solid var(--main);border-radius:0 10px 10px 0;padding:14px 18px;margin:22px 0;font-size:.93rem}
  .goal-box strong{color:var(--main)}

  .sec-h{display:flex;align-items:center;gap:10px;font-size:1.05rem;font-weight:900;color:var(--accent);margin:34px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--line)}
  .sec-h .tag{font-size:.68rem;background:var(--accent);color:#fff;border-radius:6px;padding:2px 9px;letter-spacing:.06em}

  .lesson-body p{margin-bottom:12px;font-size:.94rem}
  .lesson-body h4{color:var(--accent);font-size:.95rem;margin:20px 0 8px}
  .lesson-body table{width:100%;border-collapse:collapse;font-size:.87rem;margin:12px 0}
  .lesson-body th{background:var(--accent);color:#fff;padding:8px 12px;text-align:left;font-weight:700}
  .lesson-body td{border:1px solid var(--line);padding:8px 12px;background:#fff}
  .lesson-body tr:nth-child(even) td{background:#fafcfe}
  .ex{background:#f2f6fb;border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.92rem}
  .ex .e{font-weight:700;color:var(--accent)}
  .ex .j{font-size:.83rem;color:var(--gray)}
  .ok-box,.ng-box{border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.9rem}
  .ok-box{background:var(--ok-bg);border-left:4px solid var(--ok)}
  .ng-box{background:var(--ng-bg);border-left:4px solid var(--ng)}
  .ok-box .h{color:var(--ok);font-weight:900;font-size:.8rem}
  .ng-box .h{color:var(--ng);font-weight:900;font-size:.8rem}
  .tip{background:#fffbe8;border-left:4px solid #e0a800;border-radius:0 10px 10px 0;padding:12px 16px;margin:12px 0;font-size:.88rem}
  .tip strong{color:#9a7400}

  .drill{border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;background:#fff}
  .drill .q{font-weight:700;font-size:.93rem;margin-bottom:12px}
  .drill .q .qnum{color:var(--main);font-family:'Montserrat';font-weight:800;margin-right:8px}
  .choices{display:grid;gap:8px}
  .choice{
    text-align:left;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;
    padding:10px 14px;cursor:pointer;font-family:inherit;font-size:.9rem;transition:border-color .15s;
  }
  .choice:hover{border-color:var(--accent)}
  .choice.correct{background:var(--ok-bg);border-color:var(--ok);font-weight:700}
  .choice.wrong{background:var(--ng-bg);border-color:var(--ng)}
  .drill .fb{display:none;margin-top:12px;font-size:.85rem;background:#f2f6fb;border-radius:8px;padding:10px 14px}
  .drill .fb.show{display:block}
  .drill .fb .r{font-weight:900}
  .drill .fb .r.ok{color:var(--ok)} .drill .fb .r.ng{color:var(--ng)}

  .task-box{background:#f2f6fb;border-radius:12px;padding:22px;margin-bottom:16px;font-size:.92rem}
  .task-box .prompt{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-top:10px;font-style:italic;font-size:.9rem}
  textarea.writing{
    width:100%;min-height:220px;border:1.5px solid var(--line);border-radius:12px;padding:16px;
    font-family:inherit;font-size:.95rem;line-height:1.8;resize:vertical;background:#fff;
  }
  textarea.writing:focus{outline:none;border-color:var(--accent)}
  .wc-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:.8rem;color:var(--gray)}
  .wc strong{color:var(--accent);font-size:1rem}

  .checklist{list-style:none;margin-top:10px}
  .checklist li{margin-bottom:8px}
  .checklist label{
    display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:9px;padding:10px 14px;font-size:.88rem;cursor:pointer;font-weight:400;
  }
  .checklist input{margin-top:5px;accent-color:var(--main)}

  details.model-wrap{margin-top:10px;border:1.5px dashed var(--accent);border-radius:12px;background:#f7fafd;overflow:hidden}
  details.model-wrap summary{cursor:pointer;padding:14px 18px;font-weight:700;color:var(--accent);font-size:.9rem;list-style:none;display:flex;gap:10px;align-items:center;user-select:none}
  details.model-wrap summary::-webkit-details-marker{display:none}
  details.model-wrap summary::before{content:'▶';font-size:.65rem;transition:transform .2s}
  details.model-wrap[open] summary::before{transform:rotate(90deg)}
  .model-body{padding:0 20px 20px;font-size:.92rem}
  .model-body .m-en{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;line-height:1.9;margin:10px 0;white-space:pre-line}
  .model-body .m-note{font-size:.84rem;background:#fffbe8;border-left:4px solid #e0a800;padding:10px 14px;border-radius:0 8px 8px 0;margin-top:10px}
  .model-body .m-note strong{color:#9a7400}

  .complete-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:30px;padding-top:24px;border-top:1px solid var(--line)}
  .btn-complete{
    background:var(--main);color:#fff;border:0;cursor:pointer;border-radius:999px;
    padding:13px 34px;font-size:.95rem;font-weight:700;font-family:inherit;transition:background .2s;
  }
  .btn-complete:hover{background:var(--main-dark)}
  .btn-complete.done{background:var(--ok)}
  .nav-row{display:flex;justify-content:space-between;margin-top:20px;gap:12px}
  .btn-nav{background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:11px 24px;font-size:.88rem;font-weight:700;color:var(--accent);cursor:pointer;font-family:inherit}
  .btn-nav:hover{border-color:var(--accent)}
  .btn-nav:disabled{opacity:.35;cursor:default}

  #gate{
    position:fixed;inset:0;background:var(--accent);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .gate-card{background:#fff;border-radius:var(--radius);padding:44px 36px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow)}
  .gate-card .lock{font-size:2.4rem}
  .gate-card h1{font-size:1.15rem;color:var(--accent);margin:10px 0 6px}
  .gate-card p{font-size:.85rem;color:var(--gray);margin-bottom:20px}
  .gate-card input{
    width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;
    font-family:inherit;font-size:.95rem;background:var(--bg);margin-bottom:12px;
  }
  .gate-card input:focus{outline:none;border-color:var(--accent);background:#fff}
  .gate-card button{
    width:100%;background:var(--main);color:#fff;border:0;cursor:pointer;border-radius:999px;
    padding:13px;font-size:.95rem;font-weight:700;font-family:inherit;
  }
  .gate-card button:hover{background:var(--main-dark)}
  .gate-card .err{display:none;color:var(--ng);font-size:.82rem;font-weight:700;margin-top:10px}
  .gate-card .back{display:inline-block;margin-top:18px;font-size:.8rem;color:var(--gray);text-decoration:underline}

  .goal-list{list-style:none;margin:12px 0}
  .goal-list li{
    display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:13px 16px;margin-bottom:9px;font-size:.92rem;
  }
  .goal-list .gnum{
    flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--main);color:#fff;
    display:grid;place-items:center;font-family:'Montserrat';font-weight:800;font-size:.72rem;margin-top:2px;
  }
  .phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:14px 0}
  .phase{background:#f2f6fb;border-radius:12px;padding:18px;border-top:4px solid var(--accent)}
  .phase .p-label{font-family:'Montserrat';font-weight:800;font-size:.7rem;color:var(--main);letter-spacing:.1em}
  .phase h5{color:var(--accent);font-size:.92rem;margin:4px 0 8px}
  .phase p{font-size:.82rem;color:var(--gray);margin:0}
  .voice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:14px 0}
  .voice-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;font-size:.88rem}
  .voice-card .stars{color:#e0a800;letter-spacing:2px;font-size:.85rem}
  .voice-card .who{font-weight:700;color:var(--accent);font-size:.82rem;margin-top:10px}
  .voice-card .score{display:inline-block;background:var(--ok-bg);color:var(--ok);font-weight:900;font-size:.75rem;border-radius:6px;padding:2px 10px;margin-top:6px}
  .start-cta{
    display:block;text-align:center;background:var(--main);color:#fff;border:0;cursor:pointer;
    border-radius:999px;padding:16px;font-size:1.05rem;font-weight:700;font-family:inherit;
    width:100%;max-width:420px;margin:28px auto 0;transition:background .2s;
  }
  .start-cta:hover{background:var(--main-dark)}

  .mobile-select{display:none;margin-bottom:16px}
  .mobile-select select{
    width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;
    font-family:inherit;font-size:.92rem;background:#fff;font-weight:700;color:var(--accent);
  }

  @media (max-width:900px){
    .layout{grid-template-columns:1fr;margin-top:16px}
    aside{display:none}
    .mobile-select{display:block}
    .lesson-card{padding:26px 20px}
    .header-inner .course-name{display:none}
    .phase-grid,.voice-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="lock">🔒</div>
    <h1>受講生専用 学習サイト</h1>
    <p>PART 2｜Task 2（Day 16〜30）<br>ご購入時にお知らせしたパスワードを入力してください。</p>
    <form id="gateForm">
      <input type="password" id="gatePass" placeholder="パスワード" autocomplete="off">
      <button type="submit">ログイン</button>
      <p class="err" id="gateErr">パスワードが違います。</p>
    </form>
    <a class="back" href="index.html">← トップページへ戻る</a>
  </div>
</div>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark en">30D</span>
      <span class="course-name">30 Days IELTS Writing｜<span style="color:var(--main)">PART 2</span> Task 2</span>
    </a>
    <div class="header-right">
      <a href="day1-15.html" class="btn-ghost" style="text-decoration:none">PART 1へ</a>
      <span class="progress-pill" id="headerProgress">0 / 15 完了</span>
      <button class="btn-ghost" id="logoutBtn">ログアウト</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>Day 16 – 30｜Task 2</h2>
    <ul class="day-nav" id="dayNav"></ul>
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div id="progressFill" style="width:0%"></div></div>
      <p class="progress-text" id="progressText">0% 完了</p>
    </div>
  </aside>

  <main>
    <div class="mobile-select">
      <select id="mobileSelect"></select>
    </div>
    <div id="lessonContainer"></div>
  </main>
</div>

<script>
/* デモ用の簡易認証。本番ではサーバー側認証に置き換えてください。 */
const PASSWORD = 'ielts2026';
const AUTH_KEY = 'ielts30_auth';
const PROG_KEY = 'ielts30_progress_p2';

function store(k,v){ try{localStorage.setItem(k,v)}catch(e){} }
function load(k){ try{return localStorage.getItem(k)}catch(e){return null} }
function removeStore(k){ try{localStorage.removeItem(k)}catch(e){} }

const gate = document.getElementById('gate');
if (load(AUTH_KEY) === 'ok') gate.style.display = 'none';
document.getElementById('gateForm').addEventListener('submit', e => {
  e.preventDefault();
  if (document.getElementById('gatePass').value === PASSWORD) {
    store(AUTH_KEY,'ok'); gate.style.display = 'none';
  } else { document.getElementById('gateErr').style.display = 'block'; }
});
document.getElementById('logoutBtn').addEventListener('click', () => { removeStore(AUTH_KEY); location.reload(); });

/* =========================================================
   Day 16-30 コンテンツ
   ========================================================= */
const DAYS = [
/* ---------- DAY 16 ---------- */
{
  title:'Task 2の全体像と採点基準',
  time:'約30分',
  goal:'Task 2のルール（250語・40分・配点2倍）と、6.0答案の条件がわかる。',
  lesson:`
    <h4>Task 2とは</h4>
    <p>社会的なテーマについて<strong>250語以上のエッセイを40分で書く</strong>課題です。配点は<strong>Task 1の2倍</strong>。つまりライティングのスコアはTask 2で決まると言っても過言ではありません。</p>
    <h4>4つの採点基準（各25%）</h4>
    <table>
      <tr><th>基準</th><th>見られること</th><th>6.0のポイント</th></tr>
      <tr><td><strong>TR</strong>（課題への応答）</td><td>設問のすべてに答えたか、立場が明確か</td><td>一貫した立場＋関連するアイデア</td></tr>
      <tr><td><strong>CC</strong>（一貫性と結束性）</td><td>段落構成、論理の流れ、接続語</td><td>1段落1アイデア＋明確な段落分け</td></tr>
      <tr><td><strong>LR</strong>（語彙力）</td><td>話題に合った語彙、言い換え</td><td>繰り返しを避け、多少の背伸びをする</td></tr>
      <tr><td><strong>GRA</strong>（文法）</td><td>複文の使用、正確さ</td><td>複文を使い、意味を壊すミスを減らす</td></tr>
    </table>
    <h4>設問タイプは主に4種類</h4>
    <table>
      <tr><th>タイプ</th><th>設問の合図</th><th>学ぶ日</th></tr>
      <tr><td>① Opinion型</td><td>To what extent do you agree or disagree?</td><td>Day 24</td></tr>
      <tr><td>② Discussion型</td><td>Discuss both views and give your own opinion.</td><td>Day 25</td></tr>
      <tr><td>③ Advantage/Disadvantage型</td><td>Do the advantages outweigh the disadvantages?</td><td>Day 26</td></tr>
      <tr><td>④ Problem/Solution型</td><td>What problems…? What solutions…?</td><td>Day 27</td></tr>
    </table>
    <h4>時間配分（40分）</h4>
    <table>
      <tr><th>時間</th><th>やること</th></tr>
      <tr><td>0〜5分</td><td>設問分析＋アイデア出し＋アウトライン</td></tr>
      <tr><td>5〜35分</td><td>執筆（Intro→Body1→Body2→Conclusion）</td></tr>
      <tr><td>35〜40分</td><td>見直し（三単現・冠詞・スペル）</td></tr>
    </table>
    <div class="ng-box"><span class="h">5.5に落ちる典型パターン</span><br>・設問の一部にしか答えていない（both viewsなのに片方だけ等）・立場が途中でブレる・段落分けがない、または1文だけの段落・250語未満・暗記した定型文の丸出し</div>
    <div class="ok-box"><span class="h">6.0答案の共通点</span><br>・最初から最後まで立場が一貫している・各段落の1文目を読むだけで全体の主張がわかる・完璧な英語ではないが、ミスがあっても意味が伝わる</div>
  `,
  drills:[
    {q:'Task 2の配点はTask 1の何倍？', c:['同じ','2倍','3倍'], a:1, fb:'Task 2は2倍の重み。時間配分もTask 2に40分をしっかり確保するのが定石です。'},
    {q:'TR（課題への応答）で6.0に最も重要なのは？', c:['難しい理論を展開すること','一貫した立場を保つこと','たくさんのアイデアを詰め込むこと'], a:1, fb:'アイデアは2つで十分。それより「賛成なのか反対なのか」が最後までブレないことが重要です。'},
    {q:'「Discuss both views and give your own opinion.」で片方の意見しか書かないと？', c:['問題ない','TRが大きく下がる','語数が足りていればOK'], a:1, fb:'設問の要求に部分的にしか答えていないため、課題への応答が大幅減点。設問分析（Day 17）で防ぎます。'}
  ],
  task:{
    intro:'下の6.0レベルのモデルエッセイを読み、①筆者の立場 ②理由（2つ）③具体例 がそれぞれどの文かを特定し、メモしてください。',
    prompt:'Some people believe that children should play sport at school every day. To what extent do you agree or disagree?<br><br>【モデルエッセイ（抜粋構成）】<br>I completely agree that daily sport should be part of every school timetable. // Firstly, regular exercise keeps children healthy. Young people today spend many hours sitting in classrooms and looking at screens, so school may be the only place where they move their bodies. For example, in Japan, many elementary schools have daily physical activities, and childhood obesity rates there are among the lowest in developed countries. // Secondly, sport teaches important life skills. Through team games, children learn how to cooperate, how to lose gracefully and how to keep trying after failure. These lessons cannot be learned from textbooks. // In conclusion, I strongly support daily school sport because it protects children\'s health and builds their character.',
    placeholder:'立場：第1文「I completely agree…」＝完全賛成\n理由1：…\n理由2：…\n具体例：…',
    minWords:0
  },

    {q:'「Those who support early education argue that…」この表現の機能は？', c:['自分の意見の表明','ある立場の人々の主張の紹介','例示'], a:1, fb:'主張を「その立場の人々」に帰属させる表現。自分の意見（Personally, I…）と区別して使い分けます。'}

  task:{
    intro:'【実戦】タイマー40分で次のDiscussion型エッセイを書いてください（250語以上）。自分の意見を書き忘れないこと！',
    prompt:'Some people think that children should start formal education at a very early age, while others believe they should not start school until the age of seven. Discuss both views and give your own opinion.',
    placeholder:'（アウトライン5分：A側の言い分／B側の言い分／自分はどちら＋理由）\n\nWhile some parents believe that…',
    minWords:250
  },
  checklist:['意見Aの言い分を公平に説明した','意見Bの言い分を説明した','自分の意見を明示した（Personally, I…など）','Those who… / On the other hand などの帰属表現を使った','250語以上・40分以内'],
  model:`<div class="m-en">People disagree about the best age for children to begin formal schooling. While some parents believe that an early start gives children an academic advantage, others argue that formal lessons should not begin until around the age of seven. This essay will discuss both views before explaining why I largely support the second position.

Those who support early formal education argue that young children absorb information remarkably quickly. In their view, starting to read, write and count at the age of three or four allows children to build a strong foundation before primary school, and this may be especially valuable for children whose parents cannot teach them at home. Early schooling can therefore be seen as a tool for reducing educational inequality.

On the other hand, opponents point out that early childhood is primarily a time for play, and that play itself is how young children learn. Through games, children develop language, imagination and social skills at their own pace, without the stress of tests or targets. It is often noted that in Finland, where formal education begins at seven, students still achieve some of the best academic results in the world. This suggests that a later start does not harm, and may even help, long-term learning.

Personally, I side with the second view. Forcing very young children to sit still and study risks damaging their natural curiosity, which is the engine of all later learning. A rich play-based environment, followed by formal schooling at around seven, seems the healthiest path.

In conclusion, although early education may offer a head start, I believe that delaying formal lessons and protecting early childhood play produces more motivated and capable learners.（約270語）</div>
  <div class="m-note"><strong>この答案の構造：</strong>序論で両論＋「後者支持」を予告。Body1＝A側（早期教育派）の言い分を公平に紹介（in their viewで距離を保つ）。Body2＝B側の言い分＋フィンランドの一般例。第4段落で自分の意見（Personally）。<strong>比較ポイント：</strong>①自分の意見を書いたか ②A側を紹介した段落で潰していないか ③帰属表現（Those who / opponents point out）を使えたか。</div>`

  title:'Advantage/Disadvantage型攻略',
  time:'約60分',
  goal:'メリット・デメリットを整理し、outweigh設問に明確な判定を下せる。',
  lesson:`
    <h4>outweigh設問は「判定」を求めている</h4>
    <p>「Do the advantages outweigh the disadvantages?」は<strong>「メリットとデメリット、どちらが重い？」という判定質問</strong>です。両方を列挙するだけで判定を書かないと、TRが大きく下がります。<strong>書き始める前に判定を決めてください</strong>。</p>
    <h4>推奨構成（メリット優勢と判定する場合）</h4>
    <table>
      <tr><th>段落</th><th>内容</th></tr>
      <tr><td>Intro</td><td>言い換え＋「デメリットもあるがメリットが上回る」と判定を予告</td></tr>
      <tr><td>Body 1</td><td>デメリット側（1〜2個）を先に。＋可能なら「ただし対処可能」と軽く反論</td></tr>
      <tr><td>Body 2</td><td>メリット側（2個）。自分の判定側なので厚めに書く</td></tr>
      <tr><td>Conclusion</td><td>判定の再表明</td></tr>
    </table>
    <h4>判定を伝える表現</h4>
    <div class="ex">
    <span class="e">序論：</span>Although this trend has certain drawbacks, I believe its benefits clearly outweigh them.<br>
    <span class="e">Body 1→2の転換：</span>Despite these disadvantages, the positive effects are far more significant.<br>
    <span class="e">結論：</span>In conclusion, while [デメリット] should not be ignored, the advantages of … outweigh the disadvantages.</div>
    <h4>「重さ」を示すと説得力が出る</h4>
    <div class="ok-box"><span class="h">単なる列挙を超えるコツ</span><br>・デメリットには「対処可能性」を添える：This problem, however, can be reduced by…<br>・メリットには「影響の大きさ・広さ」を添える：This benefits not only individuals but society as a whole.<br>→「数」ではなく「重み」で比較していることが伝わる</div>
  `,
  drills:[
    {q:'outweigh設問で絶対に必要なものは？', c:['メリットとデメリットの完全なリスト','どちらが上回るかの明確な判定','中立的なまとめ'], a:1, fb:'判定こそが設問への答え。列挙だけの答案は「質問に答えていない」と見なされます。'},
    {q:'「メリット優勢」と判定する場合、デメリットはどこに書く？', c:['書かない','Body 1（先）に書く','結論に書く'], a:1, fb:'反対側を先に書き、自分の判定側（メリット）を後に置くと結論へ自然に流れます。デメリット無視は「両面の検討不足」で減点です。'},
    {q:'デメリットを書くときに説得力を上げる一言は？', c:['This problem can be reduced by…（対処可能）','This is a terrible problem.（強調）','I will not discuss this.（回避）'], a:0, fb:'「対処可能」と添えることで、デメリットを認めつつ判定（メリット優勢）を守れます。'}
  ],
  task:{
    intro:'【実戦】タイマー40分で次のA/D型エッセイを書いてください（250語以上）。書く前に判定を決めること。',
    prompt:'In many countries, an increasing number of employees work from home. Do the advantages of this trend outweigh the disadvantages?',

  },
  checklist:['序論で判定を予告した','デメリット→メリットの順で書いた（メリット優勢の場合）','デメリットに対処可能性を添えた','結論で判定を再表明した','250語以上・40分以内'],
  model:`<div class="m-en">Working from home, once a rare privilege, has become a normal arrangement in many countries. Although remote work creates some genuine difficulties, I believe its advantages for both employees and employers clearly outweigh the disadvantages.

The main drawback of home working is the loss of face-to-face contact. Employees who rarely meet their colleagues can feel isolated, and spontaneous conversations, which often produce new ideas, disappear. In addition, the boundary between work and private life can become blurred, with some people finding it hard to switch off in the evening. These problems, however, can largely be reduced by simple measures such as regular office days, video meetings and clear working-hour policies.

In contrast, the benefits of remote work are substantial and far-reaching. Firstly, employees save enormous amounts of time and money by not commuting. A worker who previously spent two hours a day on crowded trains gains ten hours a week for family, exercise or rest, which improves both health and motivation. Secondly, companies benefit as well: they can reduce office costs and recruit talented staff regardless of where they live. This is particularly valuable for parents and people with disabilities, who were often excluded from traditional office jobs. Remote work therefore benefits not only individuals but the economy and society as a whole.

In conclusion, while the lack of personal contact should not be ignored, it is a manageable problem. The huge savings in time, the wider access to jobs and the gains for businesses mean that the advantages of working from home decisively outweigh the disadvantages.（約255語）</div>
  <div class="m-note"><strong>この答案の構造：</strong>序論で判定（メリット優勢）を予告→Body1でデメリット（孤立・境界の曖昧さ）＋「対処可能」→Body2でメリット2つ（通勤時間・企業と社会への利益）を厚めに→結論で判定を再表明。<strong>比較ポイント：</strong>①判定が序論・結論の両方にあるか ②デメリットにも触れたか ③In contrast / however で両面の切り替えが明確か。</div>`
},

{
  title:'Problem/Solution型攻略',
  time:'約60分',
  goal:'問題→解決策が対応したP/S型エッセイを書き切れる。',
  lesson:`
    <h4>P/S型の絶対ルール：問題と解決策を「対応」させる</h4>
    <p>設問は「What problems? What solutions?」の2つの質問。<strong>挙げた問題に対応する解決策</strong>を書くことが重要です。問題A・Bを挙げたのに解決策がCの話をしていると、論理が切れて見えます。</p>
    <h4>推奨構成</h4>
    <table>
      <tr><th>段落</th><th>内容</th></tr>
      <tr><td>Intro</td><td>状況の言い換え＋「問題と解決策を論じる」と予告</td></tr>
      <tr><td>Body 1</td><td>問題2つ（それぞれ説明つき）</td></tr>
      <tr><td>Body 2</td><td>解決策2つ（<strong>Body 1の問題に対応させる</strong>）</td></tr>
      <tr><td>Conclusion</td><td>問題は深刻だが対処可能、と要約</td></tr>

    <table>

    <div class="ex"><span class="e">問題と解決策をつなぐ表現：</span><br>
    To tackle the first problem, … / One effective solution to … is … / This issue could be addressed by -ing / To prevent this, …</div>

    {q:'解決策の説得力を上げる工夫は？', c:['「みんなが頑張るべき」と書く','主体（政府・企業・個人）と具体的な仕組みを示す','解決策は1つに絞る'], a:1, fb:'「政府は〜を導入すべき」「学校は〜を教えるべき」と、誰が何をするかを明示します。'},
    {q:'250語での適切な問題・解決策の数は？', c:['問題1つ・解決策1つ','問題2つ・解決策2つ','問題4つ・解決策4つ'], a:1, fb:'2＋2が展開の深さと網羅性のバランス最適点。4つ以上は必ず浅くなります。'}
  ],
  task:{
    intro:'【実戦】タイマー40分で次のP/S型エッセイを書いてください（250語以上）。問題2つ→対応する解決策2つの構成で。',
    prompt:'The number of private cars in cities continues to grow. What problems does this cause, and what measures could be taken to solve them?',
    placeholder:'（アウトライン：問題①渋滞→解決①？／問題②大気汚染→解決②？）\n\nIn cities around the world, the number of private vehicles…',
    minWords:250
  },
  checklist:['問題を2つ、説明つきで書いた','解決策2つが問題2つに対応している','解決策の主体（政府など）と仕組みが具体的','To tackle this problem などの対応表現を使った','250語以上・40分以内'],
  model:`<div class="m-en">In cities around the world, the number of private vehicles on the roads is rising year after year. This trend causes serious problems for urban life, but effective measures exist to deal with them.

The first major problem is chronic traffic congestion. When too many cars compete for limited road space, journeys that should take twenty minutes stretch into hours, wasting fuel and working time. The second, and more dangerous, problem is air pollution. Exhaust fumes contain harmful substances that damage residents\' health, and it is widely reported that respiratory diseases are more common in heavily congested cities. Children and elderly people are particularly vulnerable to this invisible threat.

Fortunately, both problems can be addressed. To tackle congestion, governments should invest heavily in fast, affordable public transport while making city-centre driving less attractive, for example through congestion charges like the one introduced in London. When reliable alternatives exist, many drivers willingly give up their cars for daily commuting. To reduce air pollution, authorities could accelerate the shift to electric vehicles by subsidising their purchase and expanding charging networks, and individuals can also contribute by choosing bicycles or car-sharing for short journeys. These measures work best in combination: fewer cars overall, and cleaner cars among those that remain.

In conclusion, the growth of private car use causes congestion that wastes time and pollution that damages health. However, a combination of better public transport, road pricing and cleaner vehicle technology can solve both problems, provided that governments act decisively.（約245語）</div>
  <div class="m-note"><strong>この答案の構造：</strong>問題①渋滞→解決①公共交通＋ロンドン型課金、問題②大気汚染→解決②EV補助＋個人の行動、ときれいに対応。主体も政府・当局・個人と変化。結論は「問題→対処可能」の要約。<strong>比較ポイント：</strong>①問題と解決策が対応しているか ②解決策が精神論でなく仕組みか ③To tackle… などの対応表現があるか。※語数が245語とやや不足気味の例です。あなたの答案が250語を超えていればその点はこの回答例より優れています。</div>`

{
  title:'複文で書く（GRA 6.0対策）',
  time:'約30分',
  goal:'単文の羅列から抜け出し、従属節・関係詞を使った複文を正確に書ける。',
  lesson:`
    <h4>GRA 6.0の条件＝「複文を使い、ミスがあっても意味が伝わる」</h4>
    <p>単文（S V. S V. S V.）だけの答案は、ミスがゼロでもGRA 5.5止まりです。<strong>複文への書き換えパターン</strong>を身につけましょう。</p>
    <h4>複文を作る4つの道具</h4>
    <table>
      <tr><th>道具</th><th>例</th></tr>
      <tr><td>① 従属接続詞<br>(although / because / if / when)</td><td>Many students work part-time. They are busy.<br>→ <strong>Because</strong> many students work part-time, they have little free time.</td></tr>
      <tr><td>② 関係代名詞<br>(who / which / that)</td><td>Remote work suits parents. They have young children.<br>→ Remote work suits parents <strong>who</strong> have young children.</td></tr>
      <tr><td>③ 分詞・動名詞</td><td>People exercise regularly. They sleep better.<br>→ People <strong>exercising regularly</strong> tend to sleep better. / <strong>By exercising regularly</strong>, people sleep better.</td></tr>
      <tr><td>④ 名詞節<br>(that / whether)</td><td>Technology changes fast. This is clear.<br>→ It is clear <strong>that</strong> technology changes fast.</td></tr>
    </table>
    <h4>頻出ミスと直し方</h4>
    <div class="ng-box"><span class="h">3大エラー</span><br>
    ・<strong>断片文：</strong>Because it is cheap.（従属節だけで文にしている）→ 主節をつける<br>
    ・<strong>コンマ切り：</strong>It is cheap, it is popular.（コンマで文をつなぐ）→ 接続詞かセミコロンを使う<br>
    ・<strong>二重接続詞：</strong>Although it is cheap, but it is popular.→ althoughとbutはどちらか1つ</div>
    <div class="tip"><strong>無理は禁物：</strong>1文にwhichとalthoughとifを詰め込んで意味が壊れるより、「複文1つ＋単文1つ」のリズムで正確に書く方がスコアは上です。<strong>正確さ＞複雑さ</strong>。目安は「段落に複文2〜3文」。</div>
  `,
  drills:[

    {q:'「It is cheap, it is popular.」の誤りは？', c:['スペルミス','コンマだけで2つの文をつないでいる','時制の誤り'], a:1, fb:'comma splice（コンマ切り）。…cheap, so it is popular. か …cheap; it is popular. に直します。'},
    {q:'GRAで最も評価が高い書き方は？', c:['全文を3重の複文にする','複文と単文を織り交ぜ、正確に書く','ミスを恐れて全文単文にする'], a:1, fb:'バンド6の記述は「複文を試み、ミスはあっても意味が伝わる」。全単文は評価の上限が下がり、過度な複雑化は意味が壊れます。'}
  ],
  task:{
    intro:'次の単文ペア8組を、指定の道具（接続詞・関係詞など自由）で1つの複文に書き換えてください。',
    prompt:'1. Social media is convenient. It can damage teenagers\' mental health.<br>2. Some students study abroad. They want to improve their language skills.<br>3. The government builds more parks. People will exercise more.<br>4. My city introduced a bike-sharing system. Traffic decreased.<br>5. Fast food is unhealthy. Millions of people eat it every day.<br>6. Employees work from home. They save commuting time.<br>7. Children play outside less than before. This worries many experts.<br>8. A company offers flexible hours. It attracts more talented workers.',
    placeholder:'1. Although social media is convenient, it can damage teenagers\' mental health.\n2. …',
    minWords:80

  checklist:['8文すべて1文の複文になっている','接続詞・関係詞・分詞など2種類以上の道具を使った','断片文・コンマ切り・二重接続詞がない'],
  model:`<div class="m-en">1. Although social media is convenient, it can damage teenagers\' mental health.

2. Some students study abroad because they want to improve their language skills.（または: Students who want to improve their language skills often study abroad.）

3. If the government builds more parks, people will exercise more.

4. After my city introduced a bike-sharing system, traffic decreased.（または: …system, which led to a decrease in traffic.）

5. Despite being unhealthy, fast food is eaten by millions of people every day.（または: Although fast food is unhealthy, millions of people eat it every day.）

8. A company that offers flexible hours attracts more talented workers.</div>

    prompt:'【②の訂正問題】<br>1. Almost students have smartphone.<br>2. Government should discuss about this problem.<br>3. The number of old people are increasing, it is serious problem.<br>4. I think remote work is good. It has a lot of good points for workers.<br>5. Children can get many informations from internet.',

1.（教育）Extracurricular activities are as important as academic performance in developing well-rounded students.

3.（テクノロジー）Schools must teach digital literacy so that children can judge online information critically.
4.（健康）A sedentary lifestyle is one of the main causes of obesity in developed countries.
5.（社会）An ageing population places a heavy financial burden on the working generation.

【②訂正例】
1. → Most students have smartphones.（almost→most、単数→複数）
2. → The government should discuss this problem.（冠詞＋discussの前置詞削除）

  model:`<div class="m-en">It is often claimed that social media damages society more than it benefits it. While I accept that these platforms create genuine problems, I disagree with this view, because the connection and access to information they provide outweigh their negative effects.

Admittedly, social media has a dark side. Endless scrolling can harm concentration and sleep, and the constant comparison with other people\'s carefully edited lives can lower young users\' self-esteem. False information also spreads faster than corrections. However, these problems stem from how the tools are used rather than from the tools themselves, and they can be reduced through education and sensible regulation.

The first major benefit of social media is that it connects people who would otherwise be isolated. Elderly people can talk to their grandchildren abroad, patients with rare diseases can find support communities, and small businesses can reach customers without expensive advertising. For example, many family-run shops survived recent economic downturns largely because they could sell directly to followers online.

Furthermore, social media has made information and opportunity dramatically more accessible. News now reaches people within minutes, charities raise funds from millions of small donors, and ordinary citizens can make their voices heard on public issues. This openness strengthens, rather than weakens, civic participation in society.

In conclusion, although the risks of social media are real, they are manageable problems of use, not fatal flaws. Because these platforms connect isolated people and open up information to everyone, I believe social media ultimately does society considerably more good than harm.（約250語）</div>

/* =========================================================
   レンダリング
   ========================================================= */
let current = -1;
let progress = {};
try{ progress = JSON.parse(load(PROG_KEY) || '{}') }catch(e){ progress = {} }

const dayNav = document.getElementById('dayNav');
const mobileSelect = document.getElementById('mobileSelect');
const container = document.getElementById('lessonContainer');

function doneCount(){ return Object.values(progress).filter(Boolean).length }

function renderNav(){
  dayNav.innerHTML = `
    <li><button class="${current===-1?'active':''}" onclick="goTo(-1)">
      <span class="num en">INTRO</span><span>はじめに</span>
    </button></li>` +
    DAYS.map((d,i)=>`
    <li><button class="${i===current?'active':''}" onclick="goTo(${i})">
      <span class="num en">DAY ${i+16}</span><span>${d.title}</span>
      ${progress[i]?'<span class="done-mark">✓</span>':''}
    </button></li>`).join('');
  mobileSelect.innerHTML = `<option value="-1" ${current===-1?'selected':''}>はじめに｜この講座の使い方</option>` +
    DAYS.map((d,i)=>
    `<option value="${i}" ${i===current?'selected':''}>Day ${i+16}｜${d.title} ${progress[i]?'✓':''}</option>`).join('');
  const pct = Math.round(doneCount()/DAYS.length*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = pct+'% 完了';
  document.getElementById('headerProgress').textContent = doneCount()+' / 15 完了';
}

function renderLesson(){
  if(current === -1){ renderIntro(); return; }
  const d = DAYS[current];
  const drillsHtml = d.drills.map((dr,di)=>`
    <div class="drill">
      <p class="q"><span class="qnum en">Q${di+1}</span>${dr.q}</p>
      <div class="choices">
        ${dr.c.map((c,ci)=>`<button class="choice" onclick="answer(${di},${ci},this)">${String.fromCharCode(65+ci)}. ${c}</button>`).join('')}
      </div>
      <div class="fb" id="fb-${di}"></div>
    </div>`).join('');

  const checklistHtml = d.checklist.map(c=>`
    <li><label><input type="checkbox"> ${c}</label></li>`).join('');

  container.innerHTML = `
    <div class="lesson-card">
      <span class="day-label en">DAY ${current+16} / 30</span>
      <h1 class="lesson-title">${d.title}</h1>
      <span class="time-badge">⏱ 学習時間の目安：${d.time}</span>
      <div class="goal-box"><strong>今日のゴール：</strong>${d.goal}</div>

      <div class="sec-h"><span class="tag">LESSON</span>レッスン</div>
      <div class="lesson-body">${d.lesson}</div>

      <div class="sec-h"><span class="tag">DRILL</span>確認ドリル</div>
      ${drillsHtml}

      <div class="sec-h"><span class="tag">WRITING</span>ライティング課題</div>
      <div class="task-box">
        <p>${d.task.intro}</p>
        <div class="prompt">${d.task.prompt}</div>
      </div>
      <textarea class="writing" id="writingArea" placeholder="${d.task.placeholder}"></textarea>
      <div class="wc-row">
        <span>${d.task.minWords ? '目標語数：'+d.task.minWords+'語以上' : '語数は自由（メモ形式でOK）'}</span>
        <span class="wc">語数：<strong id="wordCount">0</strong></span>
      </div>

      <div class="sec-h"><span class="tag">CHECK</span>セルフチェック</div>
      <ul class="checklist">${checklistHtml}</ul>

      <div class="sec-h"><span class="tag">MODEL</span>回答例</div>
      <p style="font-size:.85rem;color:var(--gray)">必ず自分で書き終えてから開いてください。答えではなく「自分の答案に何が足りないか」を見つけるために使いましょう。</p>
      <details class="model-wrap">
        <summary>回答例を表示する</summary>
        <div class="model-body">${d.model || ''}</div>
      </details>

      <div class="complete-row">
        <button class="btn-complete ${progress[current]?'done':''}" id="completeBtn" onclick="toggleComplete()">
          ${progress[current]?'✓ 完了しました':'このDayを完了にする'}
        </button>
        <span style="font-size:.82rem;color:var(--gray)">課題を書き終えてセルフチェックを済ませたら完了！</span>
      </div>
      <div class="nav-row">
        <button class="btn-nav" onclick="goTo(${current-1})">← ${current===0?'はじめに':'Day '+(current+15)}</button>
        <button class="btn-nav" onclick="goTo(${current+1})" ${current===DAYS.length-1?'disabled':''}>Day ${current+17} →</button>
      </div>
    </div>`;

  const ta = document.getElementById('writingArea');
  ta.addEventListener('input', ()=>{
    const words = ta.value.trim().split(/\s+/).filter(w=>w.match(/[a-zA-Z]/)).length;
    document.getElementById('wordCount').textContent = words;
  });
  window.scrollTo({top:0});
}

window.goTo = function(i){
  if(i<-1||i>=DAYS.length) return;
  current = i;
  renderNav(); renderLesson();
};
window.answer = function(di,ci,btn){
  const d = DAYS[current].drills[di];
  const fb = document.getElementById('fb-'+di);
  const choices = btn.parentElement.querySelectorAll('.choice');
  choices.forEach((c,i)=>{
    c.classList.remove('correct','wrong');
    if(i===d.a) c.classList.add('correct');
  });
  if(ci!==d.a) btn.classList.add('wrong');
  fb.className = 'fb show';
  fb.innerHTML = (ci===d.a
    ? '<span class="r ok">✓ 正解！</span> '
    : '<span class="r ng">✗ 不正解。正解は '+String.fromCharCode(65+d.a)+'</span> ') + d.fb;
};
window.toggleComplete = function(){
  progress[current] = !progress[current];
  store(PROG_KEY, JSON.stringify(progress));
  renderNav();
  const btn = document.getElementById('completeBtn');
  btn.className = 'btn-complete ' + (progress[current]?'done':'');
  btn.textContent = progress[current]?'✓ 完了しました':'このDayを完了にする';
};
mobileSelect.addEventListener('change', e=>goTo(Number(e.target.value)));

renderNav(); renderLesson();
</script>
